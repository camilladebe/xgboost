syntax = "proto3";

package xgboost.collective.federated;

service Federated {
  rpc Allgather(AllgatherRequest) returns (AllgatherReply) {}
  rpc AllgatherV(AllgatherVRequest) returns (AllgatherVReply) {}
  rpc Allreduce(AllreduceRequest) returns (AllreduceReply) {}
  rpc ReportTiming(ReportTimingRequest) returns (ReportTimingReply) {}
  rpc Broadcast(BroadcastRequest) returns (BroadcastReply) {}
}

enum DataType {
  HALF = 0;
  FLOAT = 1;
  DOUBLE = 2;
  LONG_DOUBLE = 3;
  INT8 = 4;
  INT16 = 5;
  INT32 = 6;
  INT64 = 7;
  UINT8 = 8;
  UINT16 = 9;
  UINT32 = 10;
  UINT64 = 11;
}

enum ReduceOperation {
  MAX = 0;
  MIN = 1;
  SUM = 2;
  BITWISE_AND = 3;
  BITWISE_OR = 4;
  BITWISE_XOR = 5;
}

message AllgatherRequest {
  // An incrementing counter that is unique to each round to operations.
  uint64 sequence_number = 1;
  int32 rank = 2;
  bytes send_buffer = 3;
}

message AllgatherReply {
  bytes receive_buffer = 1;
}

message AllgatherVRequest {
  // An incrementing counter that is unique to each round to operations.
  uint64 sequence_number = 1;
  int32 rank = 2;
  bytes send_buffer = 3;
}

message AllgatherVReply {
  bytes receive_buffer = 1;
}

message AllreduceRequest {
  // An incrementing counter that is unique to each round to operations.
  uint64 sequence_number = 1;
  int32 rank = 2;
  bytes send_buffer = 3;
  DataType data_type = 4;
  ReduceOperation reduce_operation = 5;
  // Total time measured by the client for the Allreduce call (seconds).
  double client_total_time_s = 6;
}

message AllreduceReply {
  bytes receive_buffer = 1;
  // Pure aggregation time measured on the server (seconds).
  double server_aggregation_time_s = 2;
  // Maximum client total time across all workers for this round (seconds).
  double client_time_max_s = 3;
}

message TimingRow {
  uint64 iteration = 1;
  uint64 tree_id = 2;
  int64 tree_node_id = 3;
  double compute_time_s = 4;
  double server_time_s = 5;
  double communication_time_s = 6;
}

message ReportTimingRequest {
  repeated TimingRow rows = 1;
}

message ReportTimingReply {}

message BroadcastRequest {
  // An incrementing counter that is unique to each round to operations.
  uint64 sequence_number = 1;
  int32 rank = 2;
  bytes send_buffer = 3;
  // The root rank to broadcast from.
  int32 root = 4;
}

message BroadcastReply {
  bytes receive_buffer = 1;
}
